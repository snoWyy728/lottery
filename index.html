<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ランダムお題決定ツール</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 2rem;
            font-size: 1.5rem;
        }
        .display-window {
            height: 80px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fafafa;
            margin-bottom: 2rem;
        }
        #odai-display {
            font-size: 1.6rem;
            font-weight: bold;
            color: #2c3e50;
        }
        button {
            background-color: #0097a7;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 151, 167, 0.3);
            width: 100%;
        }
        button:hover {
            background-color: #0097a7;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 121, 107, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>今回のお題</h1>
    
    <div class="display-window">
        <div id="odai-display">ボタンを押してね</div>

    <button onclick="getOdai()">次のお題を出す</button>
